<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>video</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000000;
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
            cursor: pointer;
        }

        .video-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.8s ease;
        }

        .video-container.ready {
            opacity: 1;
        }

        .video-container video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .video-container video::-webkit-media-controls,
        .video-container video::-webkit-media-controls-panel,
        .video-container video::-webkit-media-controls-play-button,
        .video-container video::-webkit-media-controls-start-playback-button,
        .video-container video::-webkit-media-controls-enclosure,
        .video-container video::-webkit-media-controls-overlay-enclosure {
            display: none !important;
            opacity: 0 !important;
            visibility: hidden !important;
            width: 0 !important;
            height: 0 !important;
        }

        .black-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000000;
            z-index: 5;
            pointer-events: none;
            transition: opacity 0.6s ease;
            opacity: 1;
        }

        .black-overlay.hidden {
            opacity: 0;
        }

        .sound-indicator {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 100;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .sound-indicator.visible {
            opacity: 1;
            transition: opacity 0s;
        }

        .sound-indicator.fading {
            opacity: 0;
            transition: opacity 0.8s ease;
        }

        .sound-icon-wrapper {
            width: 80px;
            height: 80px;
            background: rgba(20, 20, 20, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1.5px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        .sound-icon-wrapper svg {
            width: 32px;
            height: 32px;
            fill: #ffffff;
        }
    </style>
</head>
<body>
    <div class="black-overlay" id="blackOverlay"></div>

    <div class="video-container" id="videoContainer">
        <video 
            id="mainVideo"
            autoplay 
            muted 
            playsinline 
            webkit-playsinline 
            loop 
            preload="auto"
            x-webkit-airplay="deny"
        >
            <source src="halo.mp4" type="video/mp4">
        </video>
    </div>

    <div class="sound-indicator" id="soundIndicator">
        <div class="sound-icon-wrapper">
            <svg id="iconSoundOn" viewBox="0 0 24 24">
                <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
            </svg>
            <svg id="iconSoundOff" viewBox="0 0 24 24" style="display: none;">
                <path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>
            </svg>
        </div>
    </div>

    <script>
        (function() {
            const video = document.getElementById('mainVideo');
            const videoContainer = document.getElementById('videoContainer');
            const blackOverlay = document.getElementById('blackOverlay');
            const indicator = document.getElementById('soundIndicator');
            const iconOn = document.getElementById('iconSoundOn');
            const iconOff = document.getElementById('iconSoundOff');

            let isMuted = true;
            let fadeTimer = null;
            let overlayHidden = false;

            function revealVideo() {
                if (overlayHidden) return;
                overlayHidden = true;

                videoContainer.classList.add('ready');
                blackOverlay.classList.add('hidden');

                setTimeout(() => {
                    if (blackOverlay.style.opacity !== '0') {
                        blackOverlay.style.display = 'none';
                    }
                }, 700);
            }

            video.addEventListener('canplay', () => {
                video.play().catch(() => {});
                setTimeout(revealVideo, 1500);
            });

            video.addEventListener('loadeddata', () => {
                video.play().catch(() => {});
                setTimeout(revealVideo, 1500);
            });

            if (video.readyState >= 2) {
                video.play().catch(() => {});
                setTimeout(revealVideo, 1500);
            }

            setTimeout(() => {
                revealVideo();
            }, 2000);

            function showSoundIcon() {
                if (fadeTimer) {
                    clearTimeout(fadeTimer);
                    fadeTimer = null;
                }

                indicator.classList.remove('fading');
                indicator.classList.add('visible');

                if (isMuted) {
                    iconOn.style.display = 'none';
                    iconOff.style.display = 'block';
                } else {
                    iconOn.style.display = 'block';
                    iconOff.style.display = 'none';
                }

                fadeTimer = setTimeout(() => {
                    indicator.classList.remove('visible');
                    indicator.classList.add('fading');
                }, 1500);
            }

            function handleInteraction(e) {
                e.preventDefault();
                e.stopPropagation();

                if (isMuted) {
                    video.muted = false;
                    video.volume = 1.0;
                    isMuted = false;
                } else {
                    video.muted = true;
                    isMuted = true;
                }

                showSoundIcon();

                if (video.paused) {
                    video.play().catch(() => {});
                }
            }

            document.body.addEventListener('click', handleInteraction);
            document.body.addEventListener('touchend', handleInteraction);
        })();
    </script>
</body>
</html>
